# ─────────────────────────────────────────────────
# paper_radar config.yaml
# ─────────────────────────────────────────────────
# 기존 config.yaml 포맷 완전 호환
# categories 하위에 카테고리명: keywords 리스트

categories:

  Dexterous:
    keywords:
      - Dexterous Manipulation
      - Dexterous hand
      - Multifingered
      - Multi-fingered
      - Anthropomorphic
      - In-hand Manipulation
      - Tactile sensing
      - Bimanual
      - Manipulation

  Manipulation:
    keywords:
      - Robot Manipulation
      - Robotic Manipulation
      - Robot Learning
      - Imitation Learning
      - Deformable
      - Teleoperation
      - Learning from Demonstration
      - diffusion policy
      - behavior cloning
      - contact-rich manipulation

  VLA:
    keywords:
      - Vision Language Action
      - Vision-Language-Action
      - VLA
      - robot foundation model
      - generalist robot policy
      - OpenVLA
      - pi0

  Tactile:
    keywords:
      - tactile sensing
      - tactile sensor
      - GelSight
      - visuotactile
      - slip detection
      - contact sensing

  Sim2Real:
    keywords:
      - sim-to-real
      - sim2real
      - domain randomization
      - domain adaptation robot
      - Isaac Lab
      - MuJoCo manipulation

  LearnedControl:
    keywords:
      - reinforcement learning robot
      - model predictive control robot
      - whole-body control
      - loco-manipulation
      - locomotion manipulation
      - humanoid manipulation


# ─────────────────────────────────────────────────
# HuggingFace Daily Papers 필터 (선택)
# 아래 키워드 중 하나라도 제목/초록에 포함되면 HF 핫 논문으로 포함
# 비워두면 → 전체 HF daily papers 표시
# ─────────────────────────────────────────────────
hf_filter_keywords:
  - robot
  - manipulation
  - dexterous
  - embodied
  - humanoid
  - locomotion
  - tactile
  - grasping
  - imitation learning
  - diffusion policy
  - reinforcement learning
  - sim-to-real


# ─────────────────────────────────────────────────
# 수집 설정
# ─────────────────────────────────────────────────
settings:
  max_results_per_category: 20    # 카테고리당 arXiv 최대 수집 논문 (arxiv lib 사용, 날짜 필터 없이 최신 N개)
  hf_daily_limit: 50              # HF daily papers 최대 수집 수

# ─────────────────────────────────────────────────
# GitHub 정보 (GitPage 배지용)
# ─────────────────────────────────────────────────
user_name: "cold-young"
repo_name: "robotics_paper_daily"

show_badge: False