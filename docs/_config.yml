# docs/_config.yml
# GitHub Pages Jekyll configuration
theme: minima

title: "Robotics Paper Daily"
description: "Daily robotics papers: Dexterous, Manipulation, VLA, Tactile, Sim2Real"
baseurl: "/robotics-paper-daily"
url: "https://cold-young.github.io"

# Markdown renderer settings (needed for table rendering)
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Exclude unnecessary files from build
exclude:
  - "*.py"
  - "*.yaml"
  - "*.yml"
  - "requirements.txt"
  - ".env"
  - "README.md"   # exclude root README, only build docs/index.md
