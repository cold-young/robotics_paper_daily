# docs/_config.yml
# GitHub Pages Jekyll 설정
theme: minima

title: "Robotics Paper Daily"
description: "Daily robotics papers: Dexterous, Manipulation, VLA, Tactile, Sim2Real"
baseurl: "/robotics-paper-daily"
url: "https://cold-young.github.io"

# 마크다운 렌더러 설정 (표 렌더링 위해 필요)
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# 불필요한 파일 빌드 제외
exclude:
  - "*.py"
  - "*.yaml"
  - "*.yml"
  - "requirements.txt"
  - ".env"
  - "README.md"   # 루트 README는 제외, docs/index.md만 빌드
