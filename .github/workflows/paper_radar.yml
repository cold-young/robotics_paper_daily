name: PaperRadar Daily Update

on:
  schedule:
    # 매일 오전 9시 (KST) = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:  # 수동 실행 허용

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run PaperRadar
        run: python paper_radar.py --config config.yaml --output README.md --days 1

      - name: Show stats
        run: |
          echo "=== README.md 크기 ==="
          wc -l README.md
          echo "=== HF Hot 논문 수 ==="
          grep -c "🔥" README.md || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "📄 Daily paper update $(date +'%Y.%m.%d')"
          git push
